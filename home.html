<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <!-- font awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
  <!-- tailwind and daisy ui -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <!-- google font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
  <!-- css connected -->
  <link rel="stylesheet" href="./style/style.css">
</head>

<body class="bg-gray-100 h-screen">
  <!-- header -->
  <header class="flex justify-between items-center bg-white shadow-sm p-4">
    <div class="flex justify-center items-center gap-2">
      <img class="w-6 sm:w-8" src="./assets/github-logo.png" alt="">
      <h1 class=" text-[15px] sm:font-bold">GitHub Issues Tracker</h1>
    </div>
    <div>
      <div class="flex flex-col gap-2 sm:flex-row sm:items-center sm:w-[350px] w-[230px]">

        <!-- Search -->
        <label class="input input-bordered join-item flex items-center gap-2 w-full focus-within:outline-none">

          <i class="fa-solid fa-magnifying-glass opacity-50"></i>

          <input type="search" placeholder="Search issues..." class="grow focus:outline-none" />
        </label>

        <!-- Button -->
        <button
          class="btn join-item bg-gradient-to-r from-purple-500 to-indigo-600 text-white border-none">Search</button>

      </div>
    </div>
  </header>
  <!-- button -->
  <div class="mt-4 bg-white p-3 w-10/12 mx-auto rounded-sm flex gap-4">
    <button class="btn active">All</button>
    <button class="btn ">Open</button>
    <button class="btn ">Closed</button>
  </div>
  <!-- issu count -->
  <div
    class="mt-4 bg-white p-3 w-10/12 mx-auto rounded-sm flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3">
    <div class="flex gap-3 items-center">
      <img class="w-6 h-6 sm:w-10 sm:h-10" src="./assets/Aperture.png" alt="">
      <div>
        <p class="text-xl font-bold"><span>50</span> Issues</p>
        <p class="text-[0.9rem]">Track and manage your project issues</p>
      </div>
    </div>
    <div class="flex gap-4 items-center">
      <div class="flex items-center gap-1">
        <div class="w-3 h-3 sm:w-2 sm:h-2 bg-green-500 rounded-full"></div>
        <span class="text-[14px]">Open</span>
      </div>
      <div class="flex items-center gap-1">
        <div class="w-3 h-3 sm:w-2 sm:h-2 bg-purple-500 rounded-full"></div>
        <span class="text-[14px]">Closed</span>
      </div>
    </div>
  </div>
<!-- api card -->

<section id="card-container" class="p-3 w-10/12 mx-auto my-10 grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-2">

 
</section>
<!-- Issue Modal -->
<div id="issue-modal" class="fixed inset-0 bg-black/40 flex items-center justify-center hidden p-4">

  <div class="bg-white w-full max-w-md md:max-w-lg p-5 md:p-6 rounded-xl shadow-lg">

    <!-- Title -->
    <h2 id="modal-title" class="text-xl md:text-2xl font-bold mb-2"></h2>

    <!-- Status + Author -->
    <p class="text-sm text-gray-500 mb-3 flex flex-wrap gap-2 items-center">
      <span id="modal-status" class="px-2 py-1 rounded text-xs md:text-sm"></span>
      <span>•</span>
      <span id="modal-author"></span>
    </p>

    <!-- Labels -->
    <div id="modal-labels" class="flex flex-wrap gap-2 mb-3"></div>

    <!-- Description -->
    <p id="modal-desc" class="text-gray-600 mb-5 text-sm md:text-base"></p>

    <!-- Assignee + Priority -->
    <div class="flex flex-col md:flex-row md:justify-between gap-4 bg-gray-100 p-3 rounded mb-4">

      <div>
        <p class="text-sm text-gray-500">Assignee:</p>
        <p id="modal-assignee" class="font-semibold"></p>
      </div>

      <div>
        <p class="text-sm text-gray-500">Priority:</p>
        <span id="modal-priority" class="text-white bg-red-400 px-3 py-1 rounded-full text-sm"></span>
      </div>

    </div>

    <!-- Close Button -->
    <div class="text-right">
      <button id="close-modal"
        class="bg-purple-600 text-white px-4 py-2 rounded text-sm md:text-base">
        Close
      </button>
    </div>

  </div>

</div>



  <script src="./script/home.js"></script>
</body>

</html>
