<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <!-- font awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
  <!-- tailwind and daisy ui -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <!-- google font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
  <!-- css connected -->
  <link rel="stylesheet" href="./style/style.css">
</head>

<body class="bg-gray-100 h-screen">
  <!-- header -->
  <header class="flex justify-between items-center bg-white shadow-sm p-4">
    <div class="flex justify-center items-center gap-2">
      <img class="w-6 sm:w-8" src="./assets/github-logo.png" alt="">
      <h1 class=" text-[15px] sm:font-bold">GitHub Issues Tracker</h1>
    </div>
    <div>
      <div class="join w-[230px] sm:w-[350px]">
      
        <!-- Search -->
        <label class="input input-bordered join-item flex items-center gap-2 w-full focus-within:outline-none">
      
          <i class="fa-solid fa-magnifying-glass opacity-50"></i>
      
          <input type="search" placeholder="Search issues..." class="grow focus:outline-none" />
      
        </label>
      
        <!-- Button -->
        <button class="btn join-item bg-gradient-to-r from-purple-500 to-indigo-600 text-white border-none">Search</button>
      
      </div>
    </div>
  </header>
  <!-- button -->
   <div class="mt-4 bg-white p-3 w-10/12 mx-auto rounded-sm flex gap-4">
    <button class="btn">All</button>
    <button class="btn">Open</button>
    <button class="btn">Closed</button>
   </div>
   <!-- issu count -->
    <div class="mt-4 bg-white p-3 w-10/12 mx-auto rounded-sm flex justify-between items-center">
      <div class="flex gap-3 justify-center items-center">
      <img class="w-6 h-6 sm:w-10 sm:h-full" src="./assets/Aperture.png" alt="">
        <div>
          <p class="text-sm sm:text-xl font-bold"><span>50</span> Issues</p>
          <p class="text-[0.7rem] sm:">Track and manage your project issues</p>
        </div>
      </div>
      <div>
        <div class="flex items-center gap-6">
        
          <div class="flex items-center gap-2">
            <div class="w-3 h-3 bg-green-500 rounded-full"></div>
            <span class="text-[12px]">Open</span>
          </div>
        
          <div class="flex items-center gap-2">
            <div class="w-3 h-3 bg-purple-500 rounded-full"></div>
            <span class="text-[12px]">Closed</span>
          </div>
        
        </div>
    </div>









    <script src="./script/home.js"></script>
</body>

</html>
