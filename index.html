<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <!-- font awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
  <!-- tailwind and daisy ui -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <!-- google font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
  <!-- css connected -->
  <link rel="stylesheet" href="./style/style.css">
</head>

<body class="bg-[#E4E4E7] min-h-screen grid place-items-center">

  <!-- login form -->

  <div class="login-container max-w-md  w-full bg-white shadow-lg rounded-lg p-4 md:p-6">
    <!-- head -->
    <div class="mx-auto text-center mt">
      <img class="mx-auto w-12 md:w-16" src="./assets/github-logo.png" alt="">
      <h2 class="mt-2 md:mt-4 font-semibold text-lg sm:text-xl md:text-2xl">
        GitHub Issues Tracker
      </h2>
      <p class="text-gray-500">Sign in to manage your issues</p>
    </div>
    <!-- login -->
    <fieldset class="fieldset w-xs p-4 mx-auto my-2 md:my-5">

      <label class="label font-semibold text-black text-[0.8rem]">Username</label>
      <input id="username" type="email" class="input hover:border-none" placeholder="Enter Username" />
      <p class="text-[#4A00FF]">Default: admin</p>
      <label class="label  font-semibold text-black text-[0.8rem]">Enter Password</label>
      <input id="pass" type="password" class="input hover:border-none" placeholder="Password" />
      <p class="text-[#4A00FF]">Default: admin123</p>
      <button id="login-btn" class="btn btn-primary mt-3">Sign</button>
      <!-- OR -->
      <div class="flex items-center gap-2 my-4">
        <hr class="flex-1"> <span>OR</span>
        <hr class="flex-1">
      </div>
      <!-- demo -->
      <div class="text-center">
        <p class="mb-2 text-sm md:text-base font-medium">Demo Credentials:</p>
        <div class="p-3 bg-gray-200 rounded-md text-sm md:text-base">
          <p class="text-[1rem]"><span class="font-bold">Username: </span>admin
          </p>
          <p class="text-[1rem]"><span class="font-bold">Password: </span>admin123
          </p>
        </div>
      </div>
    </fieldset>

    <script src="./script/index.js"></script>
</body>



</html>
